<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SeerPeek Startup</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <main class="desktop">
      <section class="window" aria-label="SeerPeek Startup">
        <header class="title-bar">
          <div class="title-text">SeerPeek Tool</div>
          <div class="window-actions" aria-hidden="true">
            <span class="action-btn">_</span>
            <span class="action-btn">[]</span>
            <span class="action-btn">X</span>
          </div>
        </header>

        <nav class="menu-bar" aria-label="Main menu">
          <a href="#" class="menu-item">File</a>
          <a href="#" class="menu-item">View</a>
          <a href="#" class="menu-item">Tools</a>
          <a href="#" class="menu-item">Help</a>
        </nav>

        <section class="content">
          <div class="group-box">
            <h1>SeerPeek Startup</h1>
            <p>
              This page uses a WPF-like default UI style with standalone CSS.
            </p>
          </div>

          <div class="group-box">
            <h2>Quick Actions</h2>
            <div class="button-row">
              <button type="button" class="wpf-button">Open Project</button>
              <button type="button" class="wpf-button">Load Logs</button>
              <button type="button" class="wpf-button">Settings</button>
            </div>
          </div>

          <div class="status-bar" role="status">Ready</div>
        </section>
      </section>
    </main>
  </body>
</html>
